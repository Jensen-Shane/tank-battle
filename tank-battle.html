// ---- 音效系统 (Web Audio API) ----
let audioCtx = null;
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playBeep(freq, duration, type="square", vol=0.08) {
    if (!audioCtx) return;
    try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}
function sfxShoot() { playBeep(800, 0.08, "square", 0.06); playBeep(200, 0.1, "square", 0.04); }
function sfxHit() { playBeep(100, 0.2, "sawtooth", 0.08); }
function sfxDestroy() { playBeep(60, 0.3, "triangle", 0.1); }
function sfxGameOver() { playBeep(200, 0.3, "sawtooth", 0.1); playBeep(100, 0.5, "triangle", 0.08); }

// ---- 游戏状态 ----
let map = [];           // 当前地图 (深拷贝)
let level = 1;
let score = 0;
let lives = 3;
let enemiesRemaining = 20;
let enemiesActive = [];
let player = null;
let bullets = [];
let particles = [];
let gameRunning = false;
let gamePaused = false;
let gameOver = false;
let playerRespawnTimer = 0;
let enemySpawnTimer = 0;
let freezeInput = 0;
let frameCount = 0;

// ---- 生成点 ----
const PLAYER_SPAWN = { col: 9, row: 24 };  // 玩家出生点 (格坐标)
const ENEMY_SPAWNS = [
    { col: 1, row: 0 },
    { col: 12, row: 0 },
    { col: 23, row: 0 },
];

// ---- 坦克类 ----
class Tank {
    constructor(cx, cy, dir, color, speed, isPlayer=false) {
        // cx,cy 是像素坐标 (左上角)
        this.x = cx;
        this.y = cy;
        this.dir = dir;
        this.color = color;
        this.speed = speed;
        this.isPlayer = isPlayer;
        this.alive = true;
        this.shootCooldown = 0;
        this.shootDelay = isPlayer ? 15 : 60; // 帧
        this.hp = 1;
        this.flashTimer = 0;
        // 坦克占 32x32 像素
        this.w = TANK_SIZE;
        this.h = TANK_SIZE;
    }

    getCenter() {
        return { x: this.x + this.w/2, y: this.y + this.h/2 };
    }

    getBBox() {
        return { x:this.x, y:this.y, w:this.w, h:this.h };
    }

    move(dx, dy, ndir) {
        if (!this.alive) return false;
        const nx = this.x + dx;
        const ny = this.y + dy;
        this.dir = ndir;
        if (!this.collidesWithWalls(nx, ny) && !this.collidesWithTanks(nx, ny)) {
            this.x = nx;
            this.y = ny;
            // clamp to canvas
            this.x = Math.max(0, Math.min(W - this.w, this.x));
            this.y = Math.max(0, Math.min(H - this.h, this.y));
            return true;
        }
        return false;
    }

    collidesWithWalls(tx, ty) {
        // 检查坦克占据的 4 个角落及边缘
        const pts = [
            {x:tx+2, y:ty+2},
            {x:tx+this.w-2, y:ty+2},
            {x:tx+2, y:ty+this.h-2},
            {x:tx+this.w-2, y:ty+this.h-2},
        ];
        for (const p of pts) {
            const col = Math.floor(p.x / TILE);
            const row = Math.floor(p.y / TILE);
            if (col<0||col>=COLS||row<0||row>=ROWS) return true;
            const t = map[row][col];
            if (t===1 || t===2) return true;
            // 钢块=4 (base周围护墙), 基地=5
            if (t===4) return true;
            if (t===5 && !this.isPlayer) return true; // 敌人可以撞基地
        }
        return false;
    }

    collidesWithTanks(tx, ty) {
        const myBbox = {x:tx, y:ty, w:this.w, h:this.h};
        const allTanks = this.isPlayer ? enemiesActive : [player, ...enemiesActive.filter(e=>e!==this)];
        for (const t of allTanks) {
            if (!t || !t.alive) continue;
            if (t === this) continue;
            if (rectsOverlap(myBbox, t.getBBox())) return true;
        }
        return false;
    }

    shoot() {
        if (!this.alive || this.shootCooldown > 0) return;
        const c = this.getCenter();
        let bx = c.x, by = c.y;
        const offset = this.w/2 + 2;
        switch(this.dir) {
            case DIR.UP: bx -= 3; by = this.y - 4; break;
            case DIR.DOWN: bx -= 3; by = this.y + this.h; break;
            case DIR.LEFT: bx = this.x - 4; by = c.y - 3; break;
            case DIR.RIGHT: bx = this.x + this.w; by = c.y - 3; break;
        }
        bullets.push(new Bullet(bx, by, this.dir, this.isPlayer));
        this.shootCooldown = this.shootDelay;
        sfxShoot();
    }

    takeDamage() {
        this.hp--;
        this.flashTimer = 6;
        if (this.hp <= 0) {
            this.alive = false;
            this.onDestroy();
        }
    }

    onDestroy() {
        // spawn particles
        const c = this.getCenter();
        for (let i=0; i<8; i++) {
            particles.push(new Particle(c.x, c.y, this.color));
        }
        sfxDestroy();
    }

    update() {
        if (this.shootCooldown > 0) this.shootCooldown--;
        if (this.flashTimer > 0) this.flashTimer--;
    }

    draw(ctx) {
        if (!this.alive) return;
        if (this.flashTimer > 0 && this.flashTimer % 2 === 0) return; // 闪烁

        const cx = this.x, cy = this.y, w = this.w, h = this.h;
        ctx.save();
        ctx.translate(cx+w/2, cy+h/2);
        const angles = [0, Math.PI, -Math.PI/2, Math.PI/2];
        ctx.rotate(angles[this.dir]);
        ctx.translate(-w/2, -h/2);

        // 履带
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 0, 6, h);
        ctx.fillRect(w-6, 0, 6, h);
        // 履带纹理
        ctx.fillStyle = "#555";
        for (let i=0; i<h; i+=6) {
            ctx.fillRect(0, i, 6, 2);
            ctx.fillRect(w-6, i+3, 6, 2);
        }

        // 车体
        ctx.fillStyle = this.color;
        ctx.fillRect(6, 4, w-12, h-8);

        // 炮塔
        ctx.fillStyle = this.isPlayer ? "#2ecc71" : "#e74c3c";
        ctx.fillRect(w/2-4, 0, 8, h-10);

        // 炮管
        ctx.fillStyle = "#ddd";
        ctx.fillRect(w/2-2, -8, 4, 14);

        ctx.restore();
    }
}

// ---- 子弹类 ----
class Bullet {
    constructor(x, y, dir, isPlayer) {
        this.x = x;
        this.y = y;
        this.dir = dir;
        this.isPlayer = isPlayer;
        this.alive = true;
        this.w = 6; this.h = 6;
    }

    getBBox() {
        return {x:this.x-3, y:this.y-3, w:6, h:6};
    }

    update() {
        if (!this.alive) return;
        const spd = BULLET_SPEED;
        switch(this.dir) {
            case DIR.UP: this.y -= spd; break;
            case DIR.DOWN: this.y += spd; break;
            case DIR.LEFT: this.x -= spd; break;
            case DIR.RIGHT: this.x += spd; break;
        }
        // 离开画面
        if (this.x<-10||this.x>W+10||this.y<-10||this.y>H+10) {
            this.alive = false;
            return;
        }
        // 碰撞检测
        this.checkCollision();
    }

    checkCollision() {
        const col = Math.floor(this.x / TILE);
        const row = Math.floor(this.y / TILE);
        if (col<0||col>=COLS||row<0||row>=ROWS) { this.alive=false; return; }

        const tile = map[row][col];
        if (tile === 1) {
            // 砖墙: 摧毁
            map[row][col] = 0;
            this.alive = false;
            sfxHit();
            // 连锁摧毁相邻砖块 (小范围)
            for (let dr=-1; dr<=1; dr++) {
                for (let dc=-1; dc<=1; dc++) {
                    const nr=row+dr, nc=col+dc;
                    if (nr>=0&&nr<ROWS&&nc>=0&&nc<COLS && map[nr][nc]===1) {
                        if (Math.random()<0.3) map[nr][nc]=0;
                    }
                }
            }
            return;
        }
        if (tile === 2 || tile === 4) {
            // 钢铁: 子弹消失
            this.alive = false;
            return;
        }
        if (tile === 5) {
            // 击中基地!
            map[row][col] = 0;
            this.alive = false;
            sfxHit();
            endGame(false, "基地被摧毁!");
            return;
        }

        // 碰撞坦克
        if (this.isPlayer) {
            // 玩家子弹 vs 敌人
            for (const enemy of enemiesActive) {
                if (!enemy.alive) continue;
                if (rectsOverlap(this.getBBox(), enemy.getBBox())) {
                    enemy.takeDamage();
                    this.alive = false;
                    if (!enemy.alive) {
                        score += 100;
                        enemiesRemaining--;
                        updateUI();
                    }
                }
            }
        } else {
            // 敌人子弹 vs 玩家
            if (player && player.alive) {
                if (rectsOverlap(this.getBBox(), player.getBBox())) {
                    player.takeDamage();
                    this.alive = false;
                }
            }
        }
    }

    draw(ctx) {
        if (!this.alive) return;
        ctx.fillStyle = this.isPlayer ? "#fff" : "#f1c40f";
        ctx.fillRect(this.x-3, this.y-3, 6, 6);
        // 发光效果
        ctx.fillStyle = this.isPlayer ? "rgba(255,255,255,0.4)" : "rgba(241,196,15,0.4)";
        ctx.fillRect(this.x-5, this.y-5, 10, 10);
    }
}

// ---- 粒子类 ----
class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.vx = (Math.random()-0.5)*4;
        this.vy = (Math.random()-0.5)*4;
        this.life = 15+Math.random()*10;
        this.size = 2+Math.random()*3;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.life--;
    }
    draw(ctx) {
        if (this.life<=0) return;
        const alpha = this.life/25;
        ctx.fillStyle = this.color.replace(")", `,${alpha})`).replace("rgb", "rgba");
        ctx.fillRect(this.x-this.size/2, this.y-this.size/2, this.size, this.size);
    }
    get dead() { return this.life<=0; }
}

// ---- 工具函数 ----
function rectsOverlap(a, b) {
    return !(a.x+a.w <= b.x || b.x+b.w <= a.x || a.y+a.h <= b.y || b.y+b.h <= a.y);
}

// ---- 初始化 ----
function loadMap(mapData) {
    map = mapData.map(row => [...row]);
}

function spawnPlayer(instant=false) {
    const px = PLAYER_SPAWN.col * TILE;
    const py = PLAYER_SPAWN.row * TILE;
    player = new Tank(px, py, DIR.UP, "#f4d03f", PLAYER_SPEED, true);
    player.hp = 1;
    freezeInput = instant ? 0 : 60;
}

function spawnEnemy() {
    if (enemiesRemaining <= 0) return;
    const sp = ENEMY_SPAWNS[Math.floor(Math.random()*ENEMY_SPAWNS.length)];
    const ex = sp.col * TILE;
    const ey = sp.row * TILE;
    // 检查生成点是否被占用
    const testBbox = {x:ex, y:ey, w:TANK_SIZE, h:TANK_SIZE};
    for (const e of enemiesActive) {
        if (e.alive && rectsOverlap(testBbox, e.getBBox())) return;
    }
    if (player && player.alive && rectsOverlap(testBbox, player.getBBox())) return;

    // 敌方颜色: 白/灰/银
    const colors = ["#95a5a6","#bdc3c7","#7f8c8d"];
    const color = colors[Math.floor(Math.random()*colors.length)];
    const speed = ENEMY_SPEED_BASE + (level-1)*0.3 + Math.random()*0.5;
    const enemy = new Tank(ex, ey, DIR.DOWN, color, speed, false);
    // 后期关卡有概率装甲敌人
    if (level >= 3 && Math.random() < 0.3) enemy.hp = 2;
    enemiesActive.push(enemy);
    enemiesRemaining--;
    updateUI();
}

function resetLevel() {
    bullets = [];
    enemiesActive = [];
    particles = [];
    player = null;
    gameOver = false;
    gameRunning = true;
    gamePaused = false;
    playerRespawnTimer = 0;
    enemySpawnTimer = 0;
    freezeInput = 30;
    const mi = (level-1) % MAPS.length;
    loadMap(MAPS[mi]);
    spawnPlayer(true);
    enemiesRemaining = 20;
    updateUI();
}

function startGame() {
    level = 1;
    score = 0;
    lives = 3;
    resetLevel();
    document.getElementById("game-over-overlay").style.display = "none";
    initAudio();
}

function nextLevel() {
    level++;
    lives = Math.min(lives+1, 5); // 奖励一条命
    resetLevel();
    document.getElementById("game-over-overlay").style.display = "none";
}

function endGame(won, msg) {
    gameRunning = false;
    gameOver = true;
    const overlay = document.getElementById("game-over-overlay");
    overlay.style.display = "block";
    document.getElementById("overTitle").textContent = won ? "胜 利!" : "GAME OVER";
    document.getElementById("overMsg").textContent = msg || (won ? "恭喜通关!" : "再接再厉!");
    document.getElementById("overTitle").style.color = won ? "#2ecc71" : "#e74c3c";
    sfxGameOver();
}

function updateUI() {
    document.getElementById("levelNum").textContent = level;
    document.getElementById("scoreNum").textContent = score;
    document.getElementById("enemyCount").textContent = enemiesRemaining + enemiesActive.filter(e=>e.alive).length;
    document.getElementById("livesNum").textContent = "❤".repeat(Math.max(0,lives));
}

// ---- 玩家输入 ----
const keys = {};
window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    keys[e.key] = true;
    if (e.key.toLowerCase()==="p" && !gameOver) {
        gamePaused = !gamePaused;
    }
    initAudio();
});
window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
    keys[e.key] = false;
});

function handlePlayerInput() {
    if (!player || !player.alive || freezeInput>0 || gamePaused) return;
    let dx=0, dy=0, ndir=player.dir;
    if (keys["w"] || keys["arrowup"]) { dy=-player.speed; ndir=DIR.UP; }
    else if (keys["s"] || keys["arrowdown"]) { dy=player.speed; ndir=DIR.DOWN; }
    else if (keys["a"] || keys["arrowleft"]) { dx=-player.speed; ndir=DIR.LEFT; }
    else if (keys["d"] || keys["arrowright"]) { dx=player.speed; ndir=DIR.RIGHT; }

    if (dx!==0 || dy!==0) {
        // 先尝试轴对齐移动
        if (dx!==0) {
            const moved = player.move(dx, 0, ndir);
            if (!moved && ndir===DIR.UP||ndir===DIR.DOWN) player.dir = ndir;
        }
        if (dy!==0) {
            const moved = player.move(0, dy, ndir);
            if (!moved && ndir===DIR.LEFT||ndir===DIR.RIGHT) player.dir = ndir;
        }
    }

    if (keys[" "] || keys["j"]) {
        player.shoot();
    }
}

// ---- 敌人 AI ----
function enemyAI() {
    for (const enemy of enemiesActive) {
        if (!enemy.alive) continue;
        // 随机改变方向
        if (Math.random() < 0.02 || frameCount % 60 === 0) {
            // 50%概率朝向玩家
            if (player && player.alive && Math.random()<0.5) {
                const pc = player.getCenter();
                const ec = enemy.getCenter();
                const dx = pc.x-ec.x, dy = pc.y-ec.y;
                if (Math.abs(dx) > Math.abs(dy)) {
                    enemy.dir = dx>0 ? DIR.RIGHT : DIR.LEFT;
                } else {
                    enemy.dir = dy>0 ? DIR.DOWN : DIR.UP;
                }
            } else {
                enemy.dir = Math.floor(Math.random()*4);
            }
        }

        // 移动
        const spd = enemy.speed;
        let dx=0, dy=0;
        switch(enemy.dir) {
            case DIR.UP: dy=-spd; break;
            case DIR.DOWN: dy=spd; break;
            case DIR.LEFT: dx=-spd; break;
            case DIR.RIGHT: dx=spd; break;
        }
        if (!enemy.move(dx, dy, enemy.dir)) {
            // 撞墙了,随机转向
            enemy.dir = Math.floor(Math.random()*4);
        }

        // 射击
        if (Math.random() < 0.02) {
            enemy.shoot();
        }
    }
}

// ---- 主循环 ----
function update() {
    if (!gameRunning || gamePaused) return;
    frameCount++;

    // 玩家重生计时
    if (freezeInput > 0) freezeInput--;

    // 处理玩家死亡
    if (player && !player.alive && playerRespawnTimer === 0) {
        playerRespawnTimer = 90; // 1.5秒后重生
        lives--;
        updateUI();
        if (lives < 0) {
            endGame(false, "生命耗尽!");
            return;
        }
    }
    if (playerRespawnTimer > 0) {
        playerRespawnTimer--;
        if (playerRespawnTimer === 0 && lives >= 0) {
            spawnPlayer();
        }
    }

    // 敌人重生
    enemySpawnTimer--;
    if (enemySpawnTimer <= 0 && enemiesActive.filter(e=>e.alive).length < 4 && (enemiesRemaining + enemiesActive.filter(e=>e.alive).length > 0)) {
        if (enemiesRemaining > 0) {
            spawnEnemy();
            enemySpawnTimer = 120;
        }
    }

    // 检查胜利条件
    if (enemiesRemaining <= 0 && enemiesActive.filter(e=>e.alive).length === 0 && !gameOver) {
        if (level >= MAPS.length) {
            endGame(true, "全部通关! 你是坦克之王!");
        } else {
            nextLevel();
        }
        return;
    }

    handlePlayerInput();

    // 更新所有
    if (player && player.alive) player.update();
    for (const e of enemiesActive) e.update();
    enemyAI();

    // 更新子弹
    for (const b of bullets) b.update();
    // 清理死子弹
    bullets = bullets.filter(b=>b.alive);

    // 清理死敌人
    enemiesActive = enemiesActive.filter(e=>e.alive);

    // 更新粒子
    for (const p of particles) p.update();
    particles = particles.filter(p=>!p.dead);

    // 如果玩家挂了,清理其引用
    if (player && !player.alive && playerRespawnTimer===0) {
        // 等待重生
    }
}

function draw() {
    ctx.clearRect(0, 0, W, H);

    // 背景
    ctx.fillStyle = "#0a0a0a";
    ctx.fillRect(0, 0, W, H);

    // 绘制地图
    for (let row=0; row<ROWS; row++) {
        for (let col=0; col<COLS; col++) {
            const tile = map[row][col];
            const x = col*TILE, y = row*TILE;
            if (tile === 1) {
                // 砖墙
                ctx.fillStyle = "#c0392b";
                ctx.fillRect(x, y, TILE, TILE);
                ctx.fillStyle = "#e74c3c";
                ctx.fillRect(x+1, y+1, TILE-2, TILE-2);
                // 砖纹理
                ctx.fillStyle = "#a93226";
                ctx.fillRect(x+2, y+TILE/2-1, TILE-4, 2);
            } else if (tile === 2) {
                // 钢铁
                ctx.fillStyle = "#7f8c8d";
                ctx.fillRect(x, y, TILE, TILE);
                ctx.fillStyle = "#bdc3c7";
                ctx.fillRect(x+1, y+1, TILE-2, TILE-2);
                ctx.fillStyle = "#95a5a6";
                ctx.fillRect(x+4, y+4, TILE-8, TILE-8);
            } else if (tile === 3) {
                // 草丛
                ctx.fillStyle = "rgba(46,204,113,0.6)";
                ctx.fillRect(x, y, TILE, TILE);
                ctx.fillStyle = "rgba(39,174,96,0.5)";
                for (let i=0; i<3; i++) {
                    ctx.fillRect(x+Math.random()*TILE*0.6, y+Math.random()*TILE*0.6, TILE*0.5, TILE*0.4);
                }
            } else if (tile === 4) {
                // 基地防护墙
                ctx.fillStyle = "#bdc3c7";
                ctx.fillRect(x, y, TILE, TILE);
                ctx.fillStyle = "#ecf0f1";
                ctx.fillRect(x+2, y+2, TILE-4, TILE-4);
            } else if (tile === 5) {
                // 基地 (鹰)
                ctx.fillStyle = "#2c3e50";
                ctx.fillRect(x, y, TILE, TILE);
                // 画鹰的简化版
                ctx.fillStyle = "#f39c12";
                ctx.beginPath();
                ctx.arc(x+TILE/2, y+TILE/2, TILE/2-2, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#e67e22";
                ctx.beginPath();
                ctx.arc(x+TILE/2, y+TILE/2, TILE/3, 0, Math.PI*2);
                ctx.fill();
                ctx.fillStyle = "#f1c40f";
                ctx.font = `${TILE-4}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText("★", x+TILE/2, y+TILE-2);
            }
        }
    }

    // 绘制坦克
    for (const e of enemiesActive) e.draw(ctx);
    if (player && player.alive) player.draw(ctx);

    // 绘制子弹
    for (const b of bullets) b.draw(ctx);

    // 绘制粒子
    for (const p of particles) p.draw(ctx);

    // 草丛覆盖 (在坦克上面)
    for (let row=0; row<ROWS; row++) {
        for (let col=0; col<COLS; col++) {
            if (map[row][col] === 3) {
                const x=col*TILE, y=row*TILE;
                ctx.fillStyle = "rgba(46,204,113,0.55)";
                ctx.fillRect(x, y, TILE, TILE);
                ctx.fillStyle = "rgba(39,174,96,0.45)";
                ctx.fillRect(x+2, y+2, TILE-4, TILE*0.4);
            }
        }
    }

    // 暂停提示
    if (gamePaused) {
        ctx.fillStyle = "rgba(0,0,0,0.6)";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "#f4d03f";
        ctx.font = "bold 36px 'Courier New'";
        ctx.textAlign = "center";
        ctx.fillText("暂 停", W/2, H/2);
    }

    // 玩家死亡提示
    if (player && !player.alive && lives>=0 && playerRespawnTimer>0) {
        ctx.fillStyle = "rgba(231,76,60,0.7)";
        ctx.font = "bold 20px 'Courier New'";
        ctx.textAlign = "center";
        ctx.fillText("即将重生...", W/2, H/2-40);
    }
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// ---- 启动 ----
document.getElementById("restartBtn").addEventListener("click", startGame);
startGame();
gameLoop();
</script>
